name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
  WAILS_VERSION: v3.0.0-alpha.93

jobs:
  check-latest:
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
      is_alpha: ${{ steps.check.outputs.is_alpha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Check if this tag is the latest
        id: check
        run: |
          # is_alpha: workflow_dispatch 时根据 inputs.version 判定,push tag 时根据 ref_name 判定
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${{ github.ref_name }}"
          fi
          if echo "$VER" | grep -qE '(alpha|beta|rc)'; then
            echo "is_alpha=true" >> $GITHUB_OUTPUT
          else
            echo "is_alpha=false" >> $GITHUB_OUTPUT
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TAG="${{ github.ref_name }}"
          # Alpha/beta/rc tags always build
          if echo "$TAG" | grep -qE '(alpha|beta|rc)'; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LATEST=$(git tag --sort=version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | tail -1)
          echo "Latest tag: $LATEST, Current tag: $TAG"
          if [ "$LATEST" = "$TAG" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: check-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          check-latest: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Detect Wails version from go.mod
        id: wails
        run: |
          if grep -q 'wailsapp/wails/v3' go.mod; then
            echo "version=v3" >> $GITHUB_OUTPUT
            echo "wails_version=${{ env.WAILS_VERSION }}" >> $GITHUB_OUTPUT
          else
            echo "version=v2" >> $GITHUB_OUTPUT
          fi

      - name: Install Wails v3 CLI
        if: steps.wails.outputs.version == 'v3'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}

      - name: Install Wails v2 CLI
        if: steps.wails.outputs.version == 'v2'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Verify Wails installation
        run: |
          if [ "${{ steps.wails.outputs.version }}" = "v3" ]; then
            wails3 version
          else
            wails version
          fi

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Generate Wails bindings
        run: |
          if [ "${{ steps.wails.outputs.version }}" = "v3" ]; then
            wails3 generate bindings -ts -names -d frontend/bindings ./...
            cd frontend && npm run build
          else
            cd frontend && npm run build
          fi

      - name: Build macOS app (Wails v2)
        if: steps.wails.outputs.version == 'v2'
        run: |
          wails build \
            -platform darwin/${{ matrix.arch }} \
            -ldflags "-X qccg/internal/updater.Version=${{ env.VERSION }}" \
            -o qccg
        env:
          CGO_ENABLED: 1

      - name: Build macOS app (Wails v3)
        if: steps.wails.outputs.version == 'v3'
        run: |
          mkdir -p build/bin
          go build \
            -tags production \
            -trimpath \
            -ldflags="-w -s -X qccg/internal/updater.Version=${{ env.VERSION }}" \
            -o build/bin/qccg
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.arch }}

      - name: Verify build output
        run: |
          ls -lh build/bin/
          file build/bin/qccg

      - name: Create macOS .app bundle (Wails v3 only)
        if: steps.wails.outputs.version == 'v3'
        run: |
          APP_DIR="build/bin/qccg.app/Contents"
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"
          cp build/bin/qccg "$APP_DIR/MacOS/"
          cp build/appicon.png "$APP_DIR/Resources/"
          if [ -f build/darwin/icons.icns ]; then
            cp build/darwin/icons.icns "$APP_DIR/Resources/"
          fi
          # Create minimal Info.plist
          cat > "$APP_DIR/Info.plist" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>qccg</string>
            <key>CFBundleIconFile</key>
            <string>appicon</string>
            <key>CFBundleIdentifier</key>
            <string>com.qccg.app</string>
            <key>CFBundleName</key>
            <string>QCCG</string>
            <key>CFBundleDisplayName</key>
            <string>QCCG</string>
            <key>CFBundleVersion</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLISTEOF

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "QCCG" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "qccg.app" 200 190 \
            --hide-extension "qccg.app" \
            --app-drop-link 600 185 \
            "QCCG-${{ env.VERSION }}-darwin-${{ matrix.arch }}.dmg" \
            "build/bin/qccg.app" || {
              echo "DMG creation failed, uploading app bundle only"
              exit 0
            }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qccg-${{ env.VERSION }}-darwin-${{ matrix.arch }}-bin
          path: |
            build/bin/qccg
            build/bin/qccg.app/
          retention-days: 30

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('QCCG-*.dmg') != ''
        with:
          name: qccg-${{ env.VERSION }}-darwin-${{ matrix.arch }}-dmg
          path: QCCG-*.dmg
          retention-days: 30

  release:
    needs: [check-latest, build-macos]
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f | sort
          echo "=========================="

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Detect prerelease from tag
        id: release_type
        run: |
          if echo "${{ env.VERSION }}" | grep -qE '(alpha|beta|rc)'; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: false

      - name: Update Homebrew Cask
        if: steps.release_type.outputs.prerelease == 'false'
        run: |
          VERSION_CLEAN="${VERSION#v}"
          SHA_ARM64=$(sha256sum release-assets/QCCG-${VERSION}-darwin-arm64.dmg | awk '{print $1}')
          SHA_AMD64=$(sha256sum release-assets/QCCG-${VERSION}-darwin-amd64.dmg | awk '{print $1}')

          cat > Casks/qccg.rb << EOF
          cask "qccg" do
            arch arm: "arm64", intel: "amd64"

            version "${VERSION_CLEAN}"
            sha256 arm:   "${SHA_ARM64}",
                   intel: "${SHA_AMD64}"

            url "https://github.com/wangtufly/QCCG/releases/download/v#{version}/QCCG-v#{version}-darwin-#{arch}.dmg"
            name "QCCG"
            desc "Qoder Claude Codex Gemini Gateway"
            homepage "https://github.com/wangtufly/QCCG"

            depends_on macos: ">= :monterey"

            app "qccg.app", target: "QCCG.app"

            zap trash: [
              "~/Library/Application Support/QCCG",
              "~/Library/Preferences/com.qccg.app.plist",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/qccg.rb
          git commit -m "chore(brew): update cask to ${VERSION_CLEAN}" || exit 0
          git push origin HEAD:main
