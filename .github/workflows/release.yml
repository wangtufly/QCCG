name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

jobs:
  check-latest:
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Check if this tag is the latest
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LATEST=$(git tag --sort=version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | tail -1)
          echo "Latest tag: $LATEST, Current tag: ${{ github.ref_name }}"
          if [ "$LATEST" = "${{ github.ref_name }}" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: check-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          check-latest: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Verify Wails installation
        run: wails version
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Build macOS app
        run: |
          wails build \
            -platform darwin/${{ matrix.arch }} \
            -ldflags "-X main.Version=${{ env.VERSION }}" \
            -o qccg
        env:
          CGO_ENABLED: 1
      
      - name: Verify build output
        run: |
          ls -lh build/bin/
          file build/bin/qccg || true
          file build/bin/qccg.app/Contents/MacOS/qccg || true
      
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "QCCG" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "qccg.app" 200 190 \
            --hide-extension "qccg.app" \
            --app-drop-link 600 185 \
            "QCCG-${{ env.VERSION }}-darwin-${{ matrix.arch }}.dmg" \
            "build/bin/qccg.app" || {
              echo "DMG creation failed, uploading app bundle only"
              exit 0
            }
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qccg-${{ env.VERSION }}-darwin-${{ matrix.arch }}-bin
          path: |
            build/bin/qccg
            build/bin/qccg.app/
          retention-days: 30
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('QCCG-*.dmg') != ''
        with:
          name: qccg-${{ env.VERSION }}-darwin-${{ matrix.arch }}-dmg
          path: QCCG-*.dmg
          retention-days: 30

  build-linux:
    needs: check-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          check-latest: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Verify Wails installation
        run: wails version
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Build Linux app
        run: |
          wails build \
            -platform linux/amd64 \
            -ldflags "-X main.Version=${{ env.VERSION }}" \
            -o qccg
        env:
          CGO_ENABLED: 1
      
      - name: Verify build output
        run: |
          ls -lh build/bin/
          file build/bin/qccg
      
      - name: Create tarball
        run: |
          cd build/bin
          tar -czf ../../qccg-${{ env.VERSION }}-linux-amd64.tar.gz qccg
          cd ../..
          ls -lh qccg-*.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qccg-${{ env.VERSION }}-linux-amd64
          path: qccg-*.tar.gz
          retention-days: 30

  release:
    needs: [check-latest, build-macos, build-linux]
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f | sort
          echo "=========================="
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: true
          prerelease: false
          body: |
            ## QCCG ${{ env.VERSION }}
            
            ### Features
            - Multi-account management with PAT and OAuth authentication
            - Bridge service for OpenAI, Claude, Codex, and Gemini APIs
            - macOS desktop app built with Wails framework
            - Model mapping and configuration management
            - Real-time account switching and bridge control
            - System tray integration
            
            ### Downloads
            - **macOS (Intel)**: QCCG-${{ env.VERSION }}-darwin-amd64.dmg
            - **macOS (Apple Silicon)**: QCCG-${{ env.VERSION }}-darwin-arm64.dmg
            - **Linux (x64)**: qccg-${{ env.VERSION }}-linux-amd64.tar.gz
            
            ### Installation
            **macOS:**
            1. Download the `.dmg` file for your architecture
            2. Open the DMG and drag QCCG to Applications
            3. First-time users: Right-click → Open (to bypass Gatekeeper)
            
            **Linux:**
            ```bash
            tar -xzf qccg-${{ env.VERSION }}-linux-amd64.tar.gz
            ./qccg
            ```
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: false
