name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v1.0.0)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
  WAILS_VERSION: v3.0.0-alpha.93

jobs:
  check-latest:
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.check.outputs.is_latest }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
      - name: Check if this tag is the latest
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LATEST=$(git tag --sort=version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | tail -1)
          echo "Latest tag: $LATEST, Current tag: ${{ github.ref_name }}"
          if [ "$LATEST" = "${{ github.ref_name }}" ]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

  build-macos:
    needs: check-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          check-latest: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
      
      - name: Verify Wails v3 installation
        run: wails3 version
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Generate Wails v3 bindings
        run: wails3 generate bindings -ts -names -d frontend/bindings ./...
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Build macOS app
        run: |
          mkdir -p build/bin
          go build \
            -tags production \
            -trimpath \
            -ldflags="-w -s -X main.Version=${{ env.VERSION }}" \
            -o build/bin/qccg
        env:
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.arch }}
      
      - name: Verify build output
        run: |
          ls -lh build/bin/
          file build/bin/qccg
      
      - name: Create macOS .app bundle
        run: |
          APP_DIR="build/bin/qccg.app/Contents"
          mkdir -p "$APP_DIR/MacOS" "$APP_DIR/Resources"
          cp build/bin/qccg "$APP_DIR/MacOS/"
          cp build/appicon.png "$APP_DIR/Resources/"
          if [ -f build/darwin/icons.icns ]; then
            cp build/darwin/icons.icns "$APP_DIR/Resources/"
          fi
          # Create minimal Info.plist
          cat > "$APP_DIR/Info.plist" << 'PLISTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>qccg</string>
            <key>CFBundleIconFile</key>
            <string>appicon</string>
            <key>CFBundleIdentifier</key>
            <string>com.qccg.app</string>
            <key>CFBundleName</key>
            <string>QCCG</string>
            <key>CFBundleDisplayName</key>
            <string>QCCG</string>
            <key>CFBundleVersion</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.VERSION }}</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLISTEOF
      
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "QCCG" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "qccg.app" 200 190 \
            --hide-extension "qccg.app" \
            --app-drop-link 600 185 \
            "QCCG-${{ env.VERSION }}-darwin-${{ matrix.arch }}.dmg" \
            "build/bin/qccg.app" || {
              echo "DMG creation failed, uploading app bundle only"
              exit 0
            }
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: qccg-${{ env.VERSION }}-darwin-${{ matrix.arch }}-bin
          path: |
            build/bin/qccg
            build/bin/qccg.app/
          retention-days: 30
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        if: hashFiles('QCCG-*.dmg') != ''
        with:
          name: qccg-${{ env.VERSION }}-darwin-${{ matrix.arch }}-dmg
          path: QCCG-*.dmg
          retention-days: 30

  build-linux:
    needs: check-latest
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          check-latest: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Wails v3 CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
      
      - name: Verify Wails v3 installation
        run: wails3 version
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Generate Wails v3 bindings
        run: wails3 generate bindings -ts -names -d frontend/bindings ./...
      
      - name: Build frontend
        run: cd frontend && npm run build
      
      - name: Build Linux app
        run: |
          mkdir -p build/bin
          go build \
            -tags production \
            -trimpath \
            -ldflags="-w -s -X main.Version=${{ env.VERSION }}" \
            -o build/bin/qccg
        env:
          CGO_ENABLED: 1
          GOOS: linux
          GOARCH: amd64
      
      - name: Verify build output
        run: |
          ls -lh build/bin/
          file build/bin/qccg
      
      - name: Create tarball
        run: |
          cd build/bin
          tar -czf ../../qccg-${{ env.VERSION }}-linux-amd64.tar.gz qccg
          cd ../..
          ls -lh qccg-*.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qccg-${{ env.VERSION }}-linux-amd64
          path: qccg-*.tar.gz
          retention-days: 30

  release:
    needs: [check-latest, build-macos, build-linux]
    if: needs.check-latest.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts -type f | sort
          echo "=========================="
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.dmg" -exec cp {} release-assets/ \;
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          draft: false
          prerelease: true
          body: |
            ## QCCG ${{ env.VERSION }}
            
            ### Features
            - Multi-account management with PAT and OAuth authentication
            - Bridge service for OpenAI, Claude, Codex, and Gemini APIs
            - macOS desktop app built with Wails v3 framework
            - Model mapping and configuration management
            - Real-time account switching and bridge control
            - System tray integration
            
            ### Downloads
            - **macOS (Intel)**: QCCG-${{ env.VERSION }}-darwin-amd64.dmg
            - **macOS (Apple Silicon)**: QCCG-${{ env.VERSION }}-darwin-arm64.dmg
            - **Linux (x64)**: qccg-${{ env.VERSION }}-linux-amd64.tar.gz
            
            ### Installation
            **macOS:**
            1. Download the `.dmg` file for your architecture
            2. Open the DMG and drag QCCG to Applications
            3. First-time users: Right-click → Open (to bypass Gatekeeper)
            
            **Linux:**
            ```bash
            tar -xzf qccg-${{ env.VERSION }}-linux-amd64.tar.gz
            ./qccg
            ```
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: false
