name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Build macOS app
        run: |
          wails build -platform darwin/${{ matrix.arch }} -o qoder2api
      
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Qoder2API" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "qoder2api.app" 200 190 \
            --hide-extension "qoder2api.app" \
            --app-drop-link 600 185 \
            "Qoder2API-${{ github.ref_name }}-darwin-${{ matrix.arch }}.dmg" \
            "build/bin/qoder2api.app" || echo "DMG creation failed, continuing with app bundle"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qoder2api-${{ github.ref_name }}-darwin-${{ matrix.arch }}
          path: |
            build/bin/qoder2api
            build/bin/qoder2api.app
            Qoder2API-*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      
      - name: Install frontend dependencies
        run: cd frontend && npm ci
      
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      
      - name: Build Linux app
        run: wails build -platform linux/amd64 -o qoder2api
      
      - name: Create tarball
        run: |
          cd build/bin
          tar -czf ../../qoder2api-${{ github.ref_name }}-linux-amd64.tar.gz qoder2api
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qoder2api-${{ github.ref_name }}-linux-amd64
          path: qoder2api-*.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/qoder2api
            artifacts/**/qoder2api.app
          generate_release_notes: true
